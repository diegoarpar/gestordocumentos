version: "3.8"
services:
  authorization-db:
    image: postgres:latest
    restart: always
    environment:
      - POSTGRES_USER=authorization
      - POSTGRES_PASSWORD=authorization
      - POSTGRES_DB=authorization
    ports:
      - "5436:5432"
    volumes:
      - db_data_authorizationz:/var/lib/postgresql

volumes:
  db_data_authorizationz:
    driver: local
